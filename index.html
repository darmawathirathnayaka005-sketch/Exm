<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExcelReader App</title>
    
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- SheetJS for processing Excel/CSV Documents -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <style>
        /* Custom formatting for the Spreadsheet Viewer */
        .excel-viewer-container {
            width: 100%;
            overflow-x: auto;
            border-radius: 0.5rem;
            border: 1px solid #e2e8f0;
        }
        
        .excel-viewer table { 
            border-collapse: collapse; 
            width: max-content; 
            min-width: 100%;
            font-size: 0.875rem; /* text-sm */
            background-color: white;
        }
        
        .excel-viewer th, .excel-viewer td { 
            border: 1px solid #cbd5e1; 
            padding: 0.5rem 1rem; 
            white-space: nowrap; 
            color: #334155;
        }
        
        .excel-viewer th { 
            background-color: #f1f5f9; 
            font-weight: 600; 
            text-align: left; 
            color: #0f172a;
        }
        
        .excel-viewer tr:hover {
            background-color: #f8fafc;
        }
        
        /* Hide scrollbar for a cleaner look overall, but keep it for the table */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans overflow-hidden flex h-screen w-full">

    <!-- Mobile Sidebar Overlay -->
    <div id="mobile-overlay" class="fixed inset-0 bg-black/20 z-20 hidden md:hidden" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <div id="sidebar" class="fixed md:static inset-y-0 left-0 z-30 w-72 bg-white border-r border-slate-200 flex flex-col transition-transform duration-300 ease-in-out -translate-x-full md:translate-x-0">
        <div class="p-4 border-b border-slate-200 flex items-center justify-between">
            <div class="flex items-center gap-2 text-emerald-600 font-bold text-xl">
                <!-- Spreadsheet Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="9" y2="21"/><line x1="15" y1="9" x2="15" y2="21"/></svg>
                <span>ExcelReader</span>
            </div>
            <button class="md:hidden text-slate-400 hover:text-slate-600" onclick="toggleSidebar()">
                <!-- X Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>

        <div class="p-4">
            <button id="upload-btn" onclick="document.getElementById('file-input').click()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 px-4 rounded-lg flex items-center justify-center gap-2 transition-colors">
                <!-- Upload Icon -->
                <svg id="upload-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <span id="upload-text">Upload Spreadsheet</span>
            </button>
            <!-- Accept Excel and CSV files -->
            <input type="file" id="file-input" accept=".xlsx, .xls, .csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel, text/csv" class="hidden" />
            <p id="upload-error" class="text-red-500 text-xs mt-2 hidden items-start gap-1"></p>
        </div>

        <div class="flex-1 overflow-y-auto p-2">
            <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 px-2">Public Workspace</h3>
            <div id="doc-list" class="space-y-1">
                <!-- Documents will be injected here -->
                <div class="text-center p-4 text-slate-400 text-sm">
                    <p>Loading files...</p>
                </div>
            </div>
        </div>
        
        <div class="p-4 border-t border-slate-200 text-xs text-slate-500 flex items-center gap-2">
            <div id="status-dot" class="w-2 h-2 rounded-full bg-yellow-500 shrink-0"></div>
            <span id="status-text" class="truncate">Connecting to Firebase...</span>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col min-w-0 bg-slate-50 relative">
        
        <!-- Mobile Header -->
        <div class="md:hidden flex items-center justify-between bg-white border-b border-slate-200 p-4 shrink-0 shadow-sm">
            <button onclick="toggleSidebar()" class="text-slate-600">
                <!-- Menu Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <span id="mobile-title" class="font-semibold text-slate-800 truncate px-4">ExcelReader</span>
            <div class="w-6"></div>
        </div>

        <!-- Viewer Container -->
        <div id="viewer-container" class="hidden flex-col h-full w-full">
            <!-- Top Toolbar -->
            <div class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 sm:px-8 shrink-0 shadow-sm z-10">
                <div class="min-w-0 hidden md:block">
                    <h2 id="doc-title" class="text-lg font-semibold text-slate-800 truncate">Spreadsheet Title</h2>
                    <p id="doc-date" class="text-xs text-slate-500">Uploaded Date</p>
                </div>
                
                <button id="copy-btn" onclick="copyDocumentText()" class="flex items-center gap-2 px-4 py-2 rounded-md font-medium text-sm transition-all ml-auto bg-white text-slate-700 border border-slate-300 hover:bg-slate-50 hover:border-slate-400 shadow-sm">
                    <svg id="copy-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    <span id="copy-text">Copy Data</span>
                </button>
            </div>

            <!-- Spreadsheet Viewer Pane -->
            <div class="flex-1 overflow-y-auto p-4 sm:p-8 relative">
                <div class="max-w-[100%] mx-auto bg-white border border-slate-200 shadow-sm rounded-xl p-4 sm:p-6 min-h-full flex flex-col">
                    <p class="text-xs text-slate-400 mb-4 font-medium uppercase tracking-wider" id="sheet-info">Sheet 1</p>
                    <div class="excel-viewer-container flex-1">
                        <div id="doc-content" class="excel-viewer">
                            <!-- Table Content injected here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="flex-1 flex flex-col items-center justify-center p-8 text-center bg-slate-50/50">
            <div class="w-24 h-24 bg-emerald-50 rounded-full flex items-center justify-center mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="9" y2="21"/><line x1="15" y1="9" x2="15" y2="21"/></svg>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 mb-2">Read Excel Data Online</h2>
            <p class="text-slate-500 max-w-md mb-8">
                Upload `.xlsx` or `.csv` files from the sidebar to view grid data right here. This is a public workspace, so uploaded spreadsheets are shared.
            </p>
            <button onclick="document.getElementById('file-input').click()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-3 px-6 rounded-lg shadow-sm flex items-center gap-2 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Upload a Spreadsheet
            </button>
        </div>
    </div>

    <!-- Application Logic -->
    <script type="module">
        // Import standard Firebase SDKs directly via browser modules
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCDBmQCU9NvlGIWgFJvuiRIXVPlHQDpxfw",
            authDomain: "exm199-b8552.firebaseapp.com",
            projectId: "exm199-b8552",
            storageBucket: "exm199-b8552.firebasestorage.app",
            messagingSenderId: "666947238265",
            appId: "1:666947238265:web:08b333509c4e2491c057a8"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Define the SHARED PUBLIC folder path so all devices see the same files
        const APP_ID = 'exm199-b8552-app';
        const PUBLIC_COLLECTION_PATH = ['artifacts', APP_ID, 'public', 'data', 'spreadsheets'];

        // Application State
        let currentUser = null;
        let allDocuments = [];
        let activeDocId = null;

        // Elements
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const docListEl = document.getElementById('doc-list');
        const fileInput = document.getElementById('file-input');
        const uploadBtn = document.getElementById('upload-btn');
        const uploadText = document.getElementById('upload-text');
        const uploadError = document.getElementById('upload-error');
        
        const emptyState = document.getElementById('empty-state');
        const viewerContainer = document.getElementById('viewer-container');
        
        // 1. Authenticate User (Required by Firebase before reading data)
        signInAnonymously(auth).catch((error) => {
            console.error("Auth error:", error);
            statusText.innerText = "Connection failed";
            statusDot.classList.replace('bg-yellow-500', 'bg-red-500');
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                statusText.innerText = "Connected! Fetching docs...";
                statusDot.classList.replace('bg-yellow-500', 'bg-blue-500');
                loadDocuments();
            }
        });

        // 2. Load Documents from PUBLIC Workspace
        function loadDocuments() {
            if (!currentUser) return;
            
            const docsRef = collection(db, ...PUBLIC_COLLECTION_PATH);
            
            onSnapshot(docsRef, (snapshot) => {
                allDocuments = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                // Sort by newest first
                allDocuments.sort((a, b) => b.createdAt - a.createdAt);
                
                statusText.innerText = `Connected (${allDocuments.length} files)`;
                statusDot.classList.replace('bg-blue-500', 'bg-green-500');
                
                renderDocumentList();
                
                // If active doc was deleted remotely, reset view
                if (activeDocId && !allDocuments.find(d => d.id === activeDocId)) {
                    viewDocument(null);
                }
            }, (error) => {
                console.error("Firestore read error:", error);
                statusText.innerText = "Database Access Denied";
                statusDot.classList.replace('bg-blue-500', 'bg-red-500');
            });
        }

        // 3. Render List in Sidebar
        function renderDocumentList() {
            if (allDocuments.length === 0) {
                docListEl.innerHTML = `
                    <div class="text-center p-4 text-slate-400 text-sm">
                        <p>No spreadsheets uploaded yet.</p>
                    </div>`;
                return;
            }

            docListEl.innerHTML = '';
            allDocuments.forEach(docData => {
                const date = new Date(docData.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                const isSelected = docData.id === activeDocId;
                
                const div = document.createElement('div');
                div.className = `w-full text-left px-3 py-3 rounded-lg flex items-center group cursor-pointer transition-colors ${isSelected ? 'bg-emerald-50 text-emerald-700' : 'hover:bg-slate-100 text-slate-700'}`;
                
                div.innerHTML = `
                    <svg class="w-5 h-5 mr-3 shrink-0 ${isSelected ? 'text-emerald-500' : 'text-slate-400'}" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M14 13h2"/><path d="M8 17h2"/><path d="M14 17h2"/></svg>
                    <div class="flex-1 min-w-0" onclick="window.viewDocument('${docData.id}')">
                        <p class="text-sm font-medium truncate">${docData.title}</p>
                        <p class="text-xs opacity-70 truncate">${date}</p>
                    </div>
                    <button onclick="window.deleteDocument('${docData.id}', event)" class="opacity-0 group-hover:opacity-100 p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-md transition-all shrink-0 ml-1" title="Delete spreadsheet">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                    </button>
                `;
                docListEl.appendChild(div);
            });
        }

        // 4. Handle File Upload using SheetJS
        fileInput.addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            uploadError.classList.add('hidden');
            uploadText.innerText = "Processing...";
            uploadBtn.disabled = true;

            const fileExtension = file.name.split('.').pop().toLowerCase();
            if (!['xlsx', 'xls', 'csv'].includes(fileExtension)) {
                showError("Please upload a valid Excel or CSV file (.xlsx, .xls, .csv)");
                resetUploadBtn();
                return;
            }

            try {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        
                        // Parse the workbook using SheetJS
                        const workbook = XLSX.read(data, { type: 'array' });
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        
                        // Convert sheet to HTML table for viewing in the app
                        const htmlResult = XLSX.utils.sheet_to_html(worksheet);
                        
                        // FIX: Use {FS: "\t"} to convert to TAB-SEPARATED VALUES (TSV).
                        // Excel natively recognizes Tabs as column separators when pasting!
                        const tsvResult = XLSX.utils.sheet_to_csv(worksheet, { FS: "\t" });

                        if (!tsvResult || tsvResult.trim() === '') {
                            throw new Error("Spreadsheet appears to be empty.");
                        }

                        const docsRef = collection(db, ...PUBLIC_COLLECTION_PATH);
                        
                        const newDocRef = await addDoc(docsRef, {
                            title: file.name,
                            sheetName: firstSheetName,
                            htmlContent: htmlResult,
                            textContent: tsvResult, // Store the TSV version for perfectly aligned pasting
                            createdAt: Date.now(),
                            size: file.size,
                            uploadedBy: currentUser.uid
                        });

                        viewDocument(newDocRef.id);
                        fileInput.value = '';
                        closeSidebar();
                    } catch (err) {
                        console.error("Parse/Upload error", err);
                        showError("Failed to process spreadsheet or save to Firebase.");
                    } finally {
                        resetUploadBtn();
                    }
                };
                reader.readAsArrayBuffer(file);
            } catch (error) {
                showError("An unexpected error occurred.");
                resetUploadBtn();
            }
        });

        function showError(msg) {
            uploadError.innerText = msg;
            uploadError.classList.remove('hidden');
            uploadError.classList.add('flex');
        }

        function resetUploadBtn() {
            uploadText.innerText = "Upload Spreadsheet";
            uploadBtn.disabled = false;
        }

        // 5. View Document Logic
        window.viewDocument = (id) => {
            activeDocId = id;
            if (!id) {
                emptyState.classList.remove('hidden');
                viewerContainer.classList.add('hidden');
                document.getElementById('mobile-title').innerText = "ExcelReader";
            } else {
                const docData = allDocuments.find(d => d.id === id);
                if (docData) {
                    emptyState.classList.add('hidden');
                    viewerContainer.classList.remove('hidden');
                    viewerContainer.classList.add('flex');
                    
                    document.getElementById('doc-title').innerText = docData.title;
                    document.getElementById('mobile-title').innerText = docData.title;
                    document.getElementById('sheet-info').innerText = "Sheet: " + (docData.sheetName || "Data");
                    document.getElementById('doc-date').innerText = "Uploaded " + new Date(docData.createdAt).toLocaleDateString();
                    document.getElementById('doc-content').innerHTML = docData.htmlContent;
                    closeSidebar();
                }
            }
            renderDocumentList();
        };

        // 6. Delete Logic
        window.deleteDocument = async (id, e) => {
            e.stopPropagation();
            if (!currentUser) return;
            try {
                await deleteDoc(doc(db, ...PUBLIC_COLLECTION_PATH, id));
                if (activeDocId === id) viewDocument(null);
            } catch (err) {
                console.error("Error deleting:", err);
                alert("Failed to delete. Check Firebase rules.");
            }
        };

        // 7. Copy Data Logic (Now properly copies TSV format for Excel)
        window.copyDocumentText = () => {
            const docData = allDocuments.find(d => d.id === activeDocId);
            if (!docData) return;

            const textArea = document.createElement("textarea");
            // textContent now holds Tab-Separated Data instead of Comma-Separated
            textArea.value = docData.textContent; 
            textArea.style.position = "absolute";
            textArea.style.left = "-999999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                document.execCommand('copy');
                
                // UI feedback
                const btn = document.getElementById('copy-btn');
                const text = document.getElementById('copy-text');
                btn.classList.add('bg-emerald-100', 'text-emerald-800', 'border-emerald-200');
                btn.classList.remove('bg-white', 'text-slate-700', 'border-slate-300');
                text.innerText = "Copied Data!";
                
                setTimeout(() => {
                    btn.classList.remove('bg-emerald-100', 'text-emerald-800', 'border-emerald-200');
                    btn.classList.add('bg-white', 'text-slate-700', 'border-slate-300');
                    text.innerText = "Copy Data";
                }, 2000);

            } catch (err) {
                alert('Failed to copy data. Your browser might block this action.');
            } finally {
                document.body.removeChild(textArea);
            }
        };

        // 8. Mobile Sidebar Controls
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('mobile-overlay');

        window.toggleSidebar = () => {
            const isOpen = !sidebar.classList.contains('-translate-x-full');
            if (isOpen) {
                closeSidebar();
            } else {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            }
        };

        function closeSidebar() {
            sidebar.classList.add('-translate-x-full');
            overlay.classList.add('hidden');
        }

    </script>
</body>
</html>
